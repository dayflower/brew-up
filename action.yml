name: 'Homebrew Tap Update'
description: 'Generate and publish Homebrew tap files from release assets'
inputs:
  release-id:
    description: 'Release ID to resolve in source repository'
    required: false
  release-tag:
    description: 'Release tag to resolve in source repository'
    required: false
  template-path:
    description: 'Template file path in source repository'
    required: true
  output-path:
    description: 'Output file path in tap repository'
    required: true
  asset-map:
    description: 'Newline-delimited key=value map for release assets'
    required: true
  checksum-asset:
    description: 'Optional checksum asset filename'
    required: false
  target-repo:
    description: 'Tap repository in owner/name format'
    required: true
  target-branch:
    description: 'Target branch in tap repository'
    required: true
  target-repo-token:
    description: 'Token used to access tap repository'
    required: true
  publish-mode:
    description: 'Publish mode: direct, pr, or pr-auto-merge'
    required: true
  auto-merge-method:
    description: 'Auto-merge method for pr-auto-merge: merge, squash, or rebase'
    required: false
    default: 'merge'
  only-if-changed:
    description: 'Skip publish when output is unchanged'
    required: false
    default: 'true'
  dry-run:
    description: 'Run without mutating tap repository'
    required: false
    default: 'false'
  commit-author-name:
    description: 'Optional commit author name (must pair with email)'
    required: false
  commit-author-email:
    description: 'Optional commit author email (must pair with name)'
    required: false
  publish-title-template:
    description: 'Optional Mustache template used for commit title and PR title'
    required: false
  publish-body-template:
    description: 'Optional Mustache template used for commit body and PR description'
    required: false
  publish-attribution:
    description: 'Attribution target: off, commit, pr, or both'
    required: false
    default: 'both'
runs:
  using: 'node24'
  main: 'dist/main.mjs'
outputs:
  changed:
    description: 'Whether the generated output differs from target content'
  target-commit-sha:
    description: 'Target repository commit SHA when a commit is created'
  pull-request-number:
    description: 'Pull request number when PR mode creates a pull request'
  pull-request-url:
    description: 'Pull request URL when PR mode creates a pull request'
  resolved-release-id:
    description: 'Resolved source release ID'
  resolved-release-tag:
    description: 'Resolved source release tag'
