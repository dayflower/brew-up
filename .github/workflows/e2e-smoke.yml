name: e2e-smoke

on:
  workflow_dispatch:
    inputs:
      release-id:
        description: "Optional release ID in the source repository"
        required: false
        type: string
      release-tag:
        description: "Optional release tag in the source repository"
        required: false
        type: string
      template-path:
        description: "Template path in the source repository"
        required: true
        type: string
      output-path:
        description: "Output path in the target tap repository"
        required: true
        type: string
      asset-map:
        description: "asset-map input: newline-delimited key=pattern entries"
        required: true
        type: string
      checksum-asset:
        description: "Optional checksum asset filename in the source release"
        required: false
        type: string
      target-repo:
        description: "Target tap repository in owner/name format"
        required: true
        type: string
      target-branch:
        description: "Target branch in the target tap repository"
        required: true
        default: "main"
        type: string
      target-repo-token-secret-name:
        description: "Name of the source-repository secret that stores the target repository token"
        required: true
        default: "BREW_UP_TARGET_REPO_TOKEN"
        type: string
      publish-mode:
        description: "Publish mode: direct, pr, or pr-auto-merge"
        required: true
        default: "pr"
        type: choice
        options:
          - direct
          - pr
          - pr-auto-merge
      only-if-changed:
        description: "Skip when output is unchanged"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"
      dry-run:
        description: "Resolve and render only (no target mutation)"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

jobs:
  smoke:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout source repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Validate target repository token secret
        env:
          TARGET_REPO_TOKEN: ${{ secrets[inputs.target-repo-token-secret-name] }}
          TARGET_REPO_TOKEN_SECRET_NAME: ${{ inputs.target-repo-token-secret-name }}
        run: |
          if [ -z "$TARGET_REPO_TOKEN" ]; then
            echo "::error::Secret '$TARGET_REPO_TOKEN_SECRET_NAME' is not set or is empty in the source repository."
            exit 1
          fi

      - name: Run brew-up e2e smoke
        uses: ./
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          release-id: ${{ inputs.release-id }}
          release-tag: ${{ inputs.release-tag }}
          template-path: ${{ inputs.template-path }}
          output-path: ${{ inputs.output-path }}
          asset-map: ${{ inputs.asset-map }}
          checksum-asset: ${{ inputs.checksum-asset }}
          target-repo: ${{ inputs.target-repo }}
          target-branch: ${{ inputs.target-branch }}
          target-repo-token: ${{ secrets[inputs.target-repo-token-secret-name] }}
          publish-mode: ${{ inputs.publish-mode }}
          only-if-changed: ${{ inputs.only-if-changed }}
          dry-run: ${{ inputs.dry-run }}
