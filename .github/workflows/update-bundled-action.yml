name: update-bundled-action

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "tsdown.config.ts"

permissions:
  contents: write
  pull-requests: write

jobs:
  build-and-open-pr:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build bundled action output
        run: npm run build

      - name: Create pull request for bundled output
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7.0.11
        with:
          branch: ci/update-bundled-action
          delete-branch: true
          title: "chore: update bundled action output"
          commit-message: "chore: update bundled action output"
          body: |
            This PR updates the generated JavaScript bundle for the GitHub Action.
          add-paths: |
            dist/main.mjs
